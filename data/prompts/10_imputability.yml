name: imputability
description:
  This prompt contains all predicates for the imputability of the Measure to a State.

role: user
prompt: |
  *Special instructions and information:*
    - You may rely on internal knowledge to answer the query.

  *List of available and allowed target predicates for this round:*

  % Definition: The Measure was adopted or administered by an Actor.
  adopted_or_administered_by(Measure, Actor).

  % Definition: The Actor is a public authority of the central State.
  public_state_authority(Actor, State).

  % Definition: The Actor is a public authority of the intra-State.
  public_intra_state_authority(Actor, IntraState).

  % Definition: The intra-State is an intra-State of a State.
  intrastate_of(IntraState, State).

  % Definition: The Actor was designated to administer the Measure by the Designator.
  was_designated(Actor, Measure, Designator).

  % Definition: The Designator is a public authority of the central State.
  public_state_authority(Designator, State).

  % Definition: The Designator is a public authority of the intra-State.
  public_intra_state_authority(Designator, IntraState).
  
  % Definition: The Actor is a public undertaking.
  is_public_undertaking(Actor).

  % Definition: The Actor is a public undertaking of the State.
  public_undertaking_of_state(Actor, State).

  % Definition: The Actor is a public undertaking of the intra-State.
  public_undertaking_of_intra_state(Actor, IntraState).

  % Definition: The decision of the public undertaking was not taken independently of requirements set out by public authorities.
  decision_dependence_on_state_or_intra_state(Actor, Measure).

  % Definition: The public undertaking acted on official directives issued by public authorities.
  acted_on_government_directives(Actor, Measure).

  % Definition: The public undertaking was subject to strong supervision by public authorities. "Supervision" refers to continuous and active oversight by public authorities, including monitoring of operations, enforcement of reporting obligations, or prior approval of decisions, even without explicit directives.
  strong_public_supervision(Actor, Measure).

  % Definition: The scope of the Measure suggests that public authorities were involved the Measure of the acting undertaking (e.g., it pursues public objectives).
  measure_scope_indicates_involvement(Actor, Measure).

  % Definition: Other indicators show involvement of public authorities in adopting the Measure (e.g., informal influence through public actors). This predicate should only be used when the following, more specific predicates were not parsed for the same Measure:
  % - decision_dependence_on_state_or_intra_state/2
  % - acted_on_government_directives/2
  % - strong_public_supervision/2
  % - measure_scope_indicates_involvement/2
  other_indicators_of_public_involvement(Actor, Measure).

  % Definition: The public undertaking has an organic link with the State or an intra-State authority.
  organic_link_with_state_or_intra_state(Actor).

  % Definition: The public undertaking is integrated into the structures of public administration.
  integrated_into_public_administration(Actor).
  
  % Definition: The public undertaking operates in a strategic sector.
  strategic_sector(Actor).

  % Definition: The public undertaking does not compete under normal market conditions.
  not_competing_under_normal_conditions(Actor).

  % Definition: The Measure is an implementation of an obligation under Union law.
  is_implementation_of(Measure, UnionLawObligation).
  
  % Definition: The Member State had no discretion in implementing the Measure.
  no_member_state_discretion(UnionLawObligation).
