name: direct_or_indirect_advantage
description:
  This prompts parses if the Measure is a direct or an indirect advantage

role: user
prompt: |
  *List of available and allowed target predicates for this round:*

  % Definition: The Measure directly targets the Beneficiary as its primary and intended recipient.
  direct_targeting(Measure, Beneficiary).

  % Definition: The Measure causes an indirect benefit for the Beneficiary that arises as a consequence of the Measure, is distinct from its primary form or objective, and is not an automatic or mechanical result of its implementation.
  secondary_effects(Measure, Beneficiary, Effect).

  % Definition: The secondary effect caused by the Measure benefits an identifiable Undertaking.
  channeled_to_identifiable_undertaking_s(Beneficiary, Effect).

  % Definition: The secondary effect caused by the Measure benefits a group of Undertakings.
  channeled_to_group_of_undertakings(Beneficiary, Effect).