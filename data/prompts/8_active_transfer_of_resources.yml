name: active_transfer_of_resources
description:
  This prompt contains predicates of an active transfer of resources

role: user
prompt: |
  *Special instructions and information:*
    - You may rely on internal knowledge to classify the resources when needed.

  *List of available and allowed target predicates for this round:*
  
  % Definition: The Measure involves an active flow of resources.
  active_resource_flow(Measure, Resource).
  
  % Definition: The Measure includes a firm and concrete commitment to make resources available at a later point in time, but there was no resource flow so far.
  firm_and_concrete_commitment_to_make_resources_available_at_later_point(Measure, Resource).
  
  % Definition: The Resource is from the central state or from a central-state entity (e.g., a ministry or national agency).
  resource_of_central_state_entity(Resource).
  
  % Definition: The Resource used for the Measure is from an intra-state entity (e.g., a regional, provincial, or municipal authority).
  resource_of_intrastate_entity(Resource).
  
  % Definition: The Resource used for the Measure is from a public undertaking.
  resource_of_public_undertaking(Resource).
  
  % Definition: The Resource is from a public or private body appointed by the state to administer the Measure.
  resource_of_body_appointed_by_state_to_administer_measure(Resource).
  
  % Definition: The Resource is from a private body.
  resource_of_private_body(Resource).
  
  % Definition: The Resource was under public control prior to its transfer or prior to being made available to the beneficiary. 
  % Control means that a public authority had influence over how the resource could be used or made available. 
  % This predicate only applies if the resource was from a private body.
  under_public_control(Resource).
  
  % Definition: The Resource is from an international or Union-level fund (e.g., EU, EIB, EIF, IMF, EBRD).
  resource_from_international_or_union_fund(Resource, Fund).

  % Definition: National authorities have discretion over the use of the Resource from the international or Union-level fund.
  usage_discretion_by_national_authorities(Resource, Fund).
