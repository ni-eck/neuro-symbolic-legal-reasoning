name: 1_financial_activa
description:
  Parses all financial benefits the Beneficiary receives as a consequence of the Measure. 

role: user
prompt: |
  *Special Instruction and information:* 
    - All value-based predicates must use gross amounts. Parsing or interpreting net values is strictly prohibited. This includes any figures adjusted for costs, expenses, liabilities, or other deductions. Do not apply economic, financial, or accounting reasoning to reduce values. Each predicate must reflect the full, unadjusted amount directly resulting from the Measure. No offsets, no balancing, no exceptions.

    - Beneficiary can be an undertaking or a group of undertakings
  
  *List of available target predicates:*

  % Definition: The amount of money (cash or liquid funds) the Beneficiary obtained as a causal consequence of the Measure.
  parsed_money_received(Beneficiary, Measure, -> number: Value)

  % Definition: The value of assets (not money) the Beneficiary obtained as a causal consequence of the Measure.
  parsed_assets_gained(Beneficiary, Measure, -> number: Value)

  % Definition: The value of the rights or licenses the Beneficiary obtained as a causal consequence of the Measure. This value can be the market value; if no explicit market value is given, a value may be derived from standard access prices, auction outcomes, or other publicly available benchmarks for comparable rights or licenses.
  parsed_value_received_rights_licenses(Beneficiary, Measure, -> number: Value)

  % Definition: The value of the services the Beneficiary obtained as a causal consequence of the Measure.
  parsed_value_received_services(Beneficiary, Measure, -> number: Value)

  % Definition: The Beneficiary was exempted from a non-monetary legal obligation (such as a regulatory, compliance, or service obligation) as a causal consequence of the Measure, and as a result, saved the costs it would have incurred by complying with that obligation.
  parsed_cost_relieved_legal_obligations(Beneficiary, Measure, -> number: Value)

  % Definition: The Beneficiary was released from monetary obligations that it was already legally required to pay before the Measure. This captures cases where a pre-existing monetary debt, charge, fee, fine, or payment obligation was cancelled, reduced, converted, or otherwise removed as a causal consequence of the Measure. Do not use this predicate if the obligation never existed prior to the Measure, or if the Beneficiary merely entered into a new arrangement where it pays less than what others normally pay.
  parsed_costs_relieved_monetary_obligations(Beneficiary, Measure, -> number: Value)

  % Definition: The text provides evidence that the Beneficiary’s financial situation improved as a causal consequence of the Measure. This can only be parsed if there is textual evidence. If there are numerical indicators of the financial situation, this should not be parsed.
  textual_evidence_of_improved_financial_situation(Beneficiary, Measure)

  % Definition: The financial valuation of the Beneficiary after the Measure. This refers exclusively to valuation changes driven by expectations about future performance, such as anticipated demand or strategic opportunities. It does not refer to accounting-based changes in the financial balance sheet.
  financial_valuation_after(Beneficiary, Measure, -> number: AfterVal)

  % Definition: The financial valuation of the Beneficiary before the Measure. This reflects a forward-looking valuation, excluding changes based on accounting data.
  financial_valuation_before(Beneficiary, Measure, -> number: BeforeVal)

  % Definition: The Measure caused a change in the Beneficiary’s financial valuation. This refers solely to valuation shifts caused by altered expectations about the Beneficiary’s future, not by balance-sheet movements.
  caused_change_of_financial_value(Beneficiary, Measure)

  % Definition: The text provides evidence of improved financial valuation for the Beneficiary as a causal consequence of the Measure. This refers exclusively to valuation changes driven by expectations about future performance, such as anticipated demand or strategic opportunities. It does not refer to accounting-based changes in the financial balance sheet. This predicate should only be parsed if there is textual evidence. If there is numerical evidence, this should not be parsed.
  textual_evidence_of_improved_financial_valuation(Beneficiary, Measure)
